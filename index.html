<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Session Generator</title>
    <style>
        body { background: #0a0a0a; color: #ff007f; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #ff007f; box-shadow: 0 0 20px #ff007f; text-align: center; width: 350px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #ff007f; background: #000; color: #fff; text-align: center; font-size: 16px; }
        button { background: #ff007f; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #code-display { margin-top: 20px; font-size: 24px; font-weight: bold; color: #00ffff; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>WA PAIRING CODE</h2>
        <input type="text" id="number" placeholder="94771234567">
        <button onclick="getCode()">GET CODE</button>
        <div id="code-display"></div>
        <p id="status" style="color: #888; font-size: 12px;"></p>
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('number').value;
            const display = document.getElementById('code-display');
            const status = document.getElementById('status');
            
            if(!num) return alert("අංකය ඇතුළත් කරන්න!");
            
            display.innerText = "WAIT...";
            status.innerText = "සර්වර් එකට සම්බන්ධ වෙනවා...";

            try {
                // මෙතනට ඔයාගේ Backend URL එක පසුව දාන්න ඕනේ
                const response = await fetch(`https://ඔයාගේ-backend-url.onrender.com/get-code?number=${num}`);
                const data = await response.json();
                
                if(data.code) {
                    display.innerText = data.code;
                    status.innerText = "WhatsApp එකේ මේ Code එක ටයිප් කරන්න.";
                } else {
                    display.innerText = "ERROR";
                    status.innerText = "නැවත උත්සාහ කරන්න.";
                }
            } catch (e) {
                display.innerText = "OFFLINE";
                status.innerText = "Backend එක තාම Active නැහැ.";
            }
        }
    </script>
</body>
</html>
